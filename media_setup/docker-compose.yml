networks:
  arr_network:
    driver: bridge

services:
  bentopdf:
    image: bentopdf/bentopdf-simple:latest
    container_name: bentopdf
    ports:
      - "${BENTO_PORT}:8080"
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/prowlarr:/config:Z
    ports:
      - "${PROWLARR_PORT}:9696"
    restart: unless-stopped
    networks:
      - arr_network

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/radarr:/config:Z
      - ${MEDIA_PATH}:/data:z
    ports:
      - "${RADARR_PORT}:7878"
    restart: unless-stopped
    networks:
      - arr_network
    depends_on:
      - prowlarr

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/sonarr:/config:Z
      - ${MEDIA_PATH}:/data:z
    ports:
      - "${SONARR_PORT}:8989"
    restart: unless-stopped
    networks:
      - arr_network
    depends_on:
      - prowlarr

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/bazarr:/config:Z
      - ${MEDIA_PATH}:/data:z
    ports:
      - "${BAZARR_PORT}:6767"
    restart: unless-stopped
    networks:
      - arr_network
    depends_on:
      - radarr
      - sonarr

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/jellyfin:/config:Z
      - ${MEDIA_PATH}:/data:z
    ports:
      - "${JELLYFIN_PORT}:8096"
    restart: unless-stopped
    networks:
      - arr_network
    
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${QB_WEBUI_PORT}
    volumes:
      - ${CONFIG_PATH}/qbittorrent:/config:Z
      - ${DOWNLOAD_PATH}:/data/downloads:z
    ports:
      - "${QB_PORT}:${QB_PORT}"
      - "${QB_WEBUI_PORT}:${QB_WEBUI_PORT}"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped
    networks:
      - arr_network

  qui:
    image: ghcr.io/autobrr/qui:latest
    container_name: qui
    restart: unless-stopped
    ports:
      - "7476:7476"
    volumes:
      - ${CONFIG_PATH}/qui:/config:Z    

  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:Z # Optional, only if you want docker integration
      - ${CONFIG_PATH}/homarr/appdata:/appdata:Z
    environment:
      - SECRET_ENCRYPTION_KEY=33cd022c28ce96b935b6a83439178cd82e3a8e2cf7c715ad088ebdf00471cfa9
    ports:
      - "${HOMARR_PORT}:${HOMARR_PORT}"

  flaresolverr:
    # DockerHub mirror flaresolverr/flaresolverr:latest
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TZ}
    ports:
      - "${FLARE_PORT}:8191"
    restart: unless-stopped

