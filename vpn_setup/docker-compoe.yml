volumes:
  etc_wireguard:

services:
  wg-easy:
    environment:
      #  Optional:
      - PORT=51821
      # - HOST=0.0.0.0
      # - INSECURE=false
      # - HOST=144.24.135.32
      # - PASSWORD= vpn@mydomain

      - WG_HOST=vpn.sushilneupane.com.np
      # - WG_DEFAULT_DNS=1.1.1.1,8.8.8.8
      # - WG_MTU=1420
      # - WG_ALLOWED_IP=0.0.0.0/0,::/0
      # - UI_TRAFFIC_STATS=true
      # - UI_CHART_TYPE=1
      #dns:
      #- 1.1.1.1
      #- 8.8.8.8

    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    networks:
      # wg:
      #   #put your servers ip address
      #   ipv4_address: 144.24.135.32
      #   # ipv6_address: fdcc:ad94:bacf:61a3::2a
      caddy:
    volumes:
      - etc_wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      # - NET_RAW # ⚠️ Uncomment if using Podman
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1

networks:
  caddy:
    external: true
    name: caddy
    driver: bridge
